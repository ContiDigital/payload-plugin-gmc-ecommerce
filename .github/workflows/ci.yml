name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Source
        run: pnpm lint

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Run Unit and Integration Tests
        run: pnpm test:int

      - name: Build
        run: pnpm build

      - name: Pack Install Smoke Test
        run: pnpm pack:smoke
